<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MnemOS Memory Visualizer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#2E86AB; --green:#2EA043; --amber:#F0A500; --red:#CF222E; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; gap:1rem; padding:0.6rem 1rem; background:var(--surface); border-bottom:1px solid var(--border); flex-wrap:wrap; }
    header h1 { margin:0; font-size:1rem; color:var(--accent); }
    .live { color:var(--green); font-size:0.8rem; }
    .grid { flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr auto; min-height:0; }
    .panel { border:1px solid var(--border); margin:0.5rem; border-radius:8px; background:var(--surface); overflow:hidden; display:flex; flex-direction:column; }
    .panel h2 { margin:0; padding:0.5rem 0.75rem; font-size:0.85rem; border-bottom:1px solid var(--border); }
    #graphSvg { flex:1; width:100%; min-height:280px; }
    .metrics { padding:0.75rem; overflow-y:auto; }
    .cards { display:flex; gap:0.5rem; margin-bottom:0.75rem; }
    .card { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:0.5rem; text-align:center; }
    .card .val { font-size:1.4rem; font-weight:700; color:var(--accent); }
    .card .lbl { font-size:0.7rem; color:var(--muted); }
    #feed { flex:1; overflow-y:auto; font-size:0.75rem; padding:0.5rem; font-family:monospace; }
    .ev { padding:0.2rem 0; border-bottom:1px solid var(--border); }
    .ev.new_belief { color:var(--green); }
    .ev.contradiction { color:var(--amber); }
    .ev.injected { color:#58a6ff; }
    .ev.influenced { color:#39d353; }
    .ev.decayed { color:var(--amber); }
    .ev.pruned { color:var(--red); }
    #timeline { height:120px; margin:0.5rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); }
    input, button, select { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:0.3rem 0.5rem; font-size:0.8rem; }
    button { cursor:pointer; background:var(--accent); border-color:var(--accent); }
    .filters label { margin-right:0.75rem; font-size:0.75rem; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>MnemOS Memory Visualizer</h1>
    <span class="live" id="liveLabel">● Live</span>
    <label>User <input id="userId" size="28" /></label>
    <button id="refreshBtn">Refresh</button>
    <button id="autoBtn">Pause</button>
    <button id="exportBtn">Export JSON</button>
    <button id="resetZoomBtn">Reset Zoom</button>
    <a href="/">← Chat</a>
    <div class="filters">
      <label><input type="checkbox" class="fcat" value="preference" checked /> pref</label>
      <label><input type="checkbox" class="fcat" value="persona" checked /> persona</label>
      <label><input type="checkbox" class="fcat" value="system_state" checked /> system</label>
      <label><input type="checkbox" class="fconf" value="high" checked /> high</label>
      <label><input type="checkbox" class="fconf" value="mid" checked /> mid</label>
      <label><input type="checkbox" class="fconf" value="low" checked /> fading</label>
    </div>
  </header>
  <div class="grid">
    <div class="panel">
      <h2>Graph View</h2>
      <svg id="graphSvg"></svg>
      <div id="nodeDetail" style="padding:0.5rem;font-size:0.75rem;color:var(--muted)"></div>
    </div>
    <div class="panel metrics">
      <h2>Metrics Dashboard</h2>
      <div class="cards">
        <div class="card"><div class="val" id="mBeliefs">0</div><div class="lbl">Beliefs</div></div>
        <div class="card"><div class="val" id="mSessions">0</div><div class="lbl">Sessions</div></div>
        <div class="card"><div class="val" id="mAvgQ">0</div><div class="lbl">Avg Q_i</div></div>
      </div>
      <canvas id="ucbChart" height="120"></canvas>
      <canvas id="injChart" height="100" style="margin-top:0.5rem"></canvas>
      <h2 style="border:none;margin-top:0.5rem">Recent Activity</h2>
      <div id="feed"></div>
    </div>
    <div id="timeline" class="panel" style="grid-column:1/-1;margin-top:0"><h2>Belief Timeline</h2><svg id="timelineSvg" width="100%" height="80"></svg></div>
  </div>
  <script>
    const POLL_MS = 3000;
    let autoRefresh = true;
    let lastEventTs = null;
    let graphState = null;
    let ucbChart, injChart;
    let zoom;

    function uid() {
      return localStorage.getItem("mnemos_user_id") || "demo-user";
    }

    function confLevel(w) {
      if (w >= 0.85) return "high";
      if (w >= 0.55) return "mid";
      return "low";
    }

    function nodeColor(w) {
      if (w >= 0.85) return "#2EA043";
      if (w >= 0.55) return "#F0A500";
      return "#CF222E";
    }

    function filterBeliefs(beliefs) {
      const cats = [...document.querySelectorAll(".fcat:checked")].map((e) => e.value);
      const confs = [...document.querySelectorAll(".fconf:checked")].map((e) => e.value);
      return beliefs.filter((b) => cats.includes(b.category) && confs.includes(confLevel(b.node_weight)));
    }

    async function fetchGraph() {
      const user = document.getElementById("userId").value.trim();
      const r = await fetch(`/api/graph/${encodeURIComponent(user)}`);
      return r.json();
    }

    async function fetchMetrics() {
      const user = document.getElementById("userId").value.trim();
      const r = await fetch(`/api/metrics/${encodeURIComponent(user)}`);
      return r.json();
    }

    async function fetchEvents() {
      const user = document.getElementById("userId").value.trim();
      const q = lastEventTs ? `?since=${encodeURIComponent(lastEventTs)}` : "";
      const r = await fetch(`/api/events/${encodeURIComponent(user)}${q}`);
      return r.json();
    }

    function renderGraph(data) {
      const beliefs = filterBeliefs(data.beliefs || []);
      const svg = d3.select("#graphSvg");
      svg.selectAll("*").remove();
      const width = svg.node().clientWidth || 600;
      const height = 320;
      svg.attr("viewBox", [0, 0, width, height]);

      const g = svg.append("g");
      zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e) => g.attr("transform", e.transform));
      svg.call(zoom);

      const nodes = beliefs.map((b) => ({ ...b, label: (b.entity_source || "").slice(0, 12) }));
      const nodeIds = new Set(nodes.map((n) => n.id));
      const links = (data.edges || []).filter((e) => nodeIds.has(e.source) && nodeIds.has(e.target))
        .map((e) => ({ source: e.source, target: e.target, weight: e.weight }));

      const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id((d) => d.id).distance(80))
        .force("charge", d3.forceManyBody().strength(-200))
        .force("center", d3.forceCenter(width / 2, height / 2));

      const link = g.append("g").selectAll("line").data(links).join("line")
        .attr("stroke", "#30363d").attr("stroke-width", (d) => 1 + d.weight);

      const node = g.append("g").selectAll("circle").data(nodes).join("circle")
        .attr("r", (d) => 8 + d.base_utility_q * 20)
        .attr("fill", (d) => nodeColor(d.node_weight))
        .attr("stroke", "#e6edf3")
        .attr("stroke-width", (d) => 1 + d.conviction_score * 2)
        .call(d3.drag().on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
        .on("click", (_, d) => {
          document.getElementById("nodeDetail").textContent =
            `${d.entity_source} ${d.relation} ${d.entity_target} | Q=${d.base_utility_q} N=${d.injection_count} UCB=${d.ucb_score}`;
        });

      node.append("title").text((d) => `${d.entity_source} → ${d.entity_target}\nQ:${d.base_utility_q} N:${d.injection_count}`);

      sim.on("tick", () => {
        link.attr("x1", (d) => d.source.x).attr("y1", (d) => d.source.y)
            .attr("x2", (d) => d.target.x).attr("y2", (d) => d.target.y);
        node.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
      });
      graphState = { beliefs, nodes };
    }

    function renderMetrics(m, graph) {
      document.getElementById("mBeliefs").textContent = m.total_beliefs ?? 0;
      document.getElementById("mSessions").textContent = m.total_sessions ?? 0;
      document.getElementById("mAvgQ").textContent = (m.avg_q_i ?? 0).toFixed(2);

      const tl = m.ucb_timeline || { turns: [], series: {} };
      const datasets = Object.entries(tl.series || {}).map(([label, data]) => ({
        label, data, borderWidth: 2, fill: false, tension: 0.3,
      }));
      if (ucbChart) ucbChart.destroy();
      ucbChart = new Chart(document.getElementById("ucbChart"), {
        type: "line",
        data: { labels: tl.turns || [], datasets },
        options: { plugins: { legend: { labels: { color: "#8b949e", font: { size: 10 } } } }, scales: { x: { ticks: { color: "#8b949e" } }, y: { ticks: { color: "#8b949e" } } } },
      });

      const beliefs = filterBeliefs(graph.beliefs || []).sort((a, b) => b.injection_count - a.injection_count).slice(0, 12);
      if (injChart) injChart.destroy();
      injChart = new Chart(document.getElementById("injChart"), {
        type: "bar",
        data: {
          labels: beliefs.map((b) => b.entity_source.slice(0, 10)),
          datasets: [{ label: "N_i", data: beliefs.map((b) => b.injection_count), backgroundColor: beliefs.map((b) => nodeColor(b.node_weight)) }],
        },
        options: { indexAxis: "y", plugins: { legend: { display: false } }, scales: { x: { ticks: { color: "#8b949e" } }, y: { ticks: { color: "#8b949e" } } } },
      });
    }

    function formatEvent(ev) {
      const t = (ev.timestamp || "").slice(11, 19);
      const icons = { new_belief: "🟢 NEW BELIEF", contradiction: "⚡ CONTRADICTION", injected: "💉 INJECTED", influenced: "✅ INFLUENCED", decayed: "📉 DECAYED", pruned: "🗑️ PRUNED" };
      const label = icons[ev.event_type] || ev.event_type.toUpperCase();
      const body = `${ev.entity_source || ""} ${ev.entity_target ? "→ " + ev.entity_target : ""}`.trim();
      return `<div class="ev ${ev.event_type}">[${t}] ${label}  ${body}</div>`;
    }

    function prependEvents(events) {
      if (!events?.length) return;
      const feed = document.getElementById("feed");
      events.reverse().forEach((ev) => {
        feed.insertAdjacentHTML("afterbegin", formatEvent(ev));
        if (ev.timestamp) lastEventTs = ev.timestamp;
      });
      while (feed.children.length > 80) feed.lastChild.remove();
    }

    async function refresh() {
      try {
        const [graph, metrics, evData] = await Promise.all([fetchGraph(), fetchMetrics(), fetchEvents()]);
        renderGraph(graph);
        renderMetrics(metrics, graph);
        prependEvents(evData.events);
        document.getElementById("liveLabel").textContent = "● Live";
      } catch (e) {
        document.getElementById("liveLabel").textContent = "● Error";
      }
    }

    document.getElementById("userId").value = uid();
    document.getElementById("refreshBtn").onclick = refresh;
    document.getElementById("autoBtn").onclick = () => {
      autoRefresh = !autoRefresh;
      document.getElementById("autoBtn").textContent = autoRefresh ? "Pause" : "Resume";
    };
    document.getElementById("exportBtn").onclick = async () => {
      const data = await fetchGraph();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "mnemos-graph.json";
      a.click();
    };
    document.getElementById("resetZoomBtn").onclick = () => {
      d3.select("#graphSvg").transition().call(zoom.transform, d3.zoomIdentity);
    };
    document.querySelectorAll(".fcat,.fconf").forEach((el) => el.addEventListener("change", refresh));

    document.addEventListener("visibilitychange", () => {
      document.getElementById("liveLabel").textContent = document.hidden ? "● Paused (tab hidden)" : "● Live";
    });

    refresh();
    setInterval(() => {
      if (autoRefresh && !document.hidden) refresh();
    }, POLL_MS);
  </script>
</body>
</html>
