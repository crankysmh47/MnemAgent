<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MnemAgent — Living Archive</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/archive-stage.css">
  <link rel="stylesheet" href="/styles/observation-margin.css">
  <link rel="stylesheet" href="/styles/sediment-timeline.css">
  <link rel="stylesheet" href="/styles/motion.css">
  <link rel="stylesheet" href="/styles/responsive.css">
</head>
<body>
  <a class="skip-link" href="#archiveStage">Skip to the living archive</a>
  <div id="archiveApp" class="archive-app" data-status="loading">
    <header class="archive-header">
      <a class="archive-brand" href="/" aria-label="MnemAgent Living Archive home"><img src="/assets/logo.jpg" alt="MnemAgent logo"><span>MnemAgent</span></a>
      <nav class="archive-actions" aria-label="Archive links">
        <a class="github-link" href="https://github.com/crankysmh47/MnemAgent" target="_blank" rel="noopener noreferrer" aria-label="Open MnemAgent on GitHub"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .7a11.3 11.3 0 0 0-3.6 22c.6.1.8-.2.8-.5v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.2 1.2a11 11 0 0 1 5.8 0c2.2-1.5 3.2-1.2 3.2-1.2.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.2c0 .3.2.6.8.5A11.3 11.3 0 0 0 12 .7Z"/></svg></a>
        <button id="archiveMenuButton" type="button" aria-controls="archiveMenu" aria-expanded="false">Archive controls</button>
      </nav>
    </header>
    <main class="archive-composition">
      <section id="archiveStage" class="archive-stage" aria-labelledby="archiveTitle">
        <h1 id="archiveTitle" class="sr-only">MnemAgent Living Archive</h1>
        <svg id="archiveSvg" viewBox="0 0 1000 720" role="img" aria-describedby="archiveStatus"><defs id="archiveDefs"></defs><g id="archiveWorld"></g></svg>
        <p id="archiveStatus" class="sr-only" aria-live="polite"></p>
        <ol id="memoryCompanionList" class="sr-only"></ol>
      </section>
      <aside id="observationMargin" class="observation-margin" aria-label="Archive observation">
        <p class="observation-eyebrow">Living observation</p>
        <section id="narrativeCopy" aria-live="polite"></section>
        <section id="memoryDetail" aria-label="Selected memory"></section>
        <dl id="vitalSigns" aria-label="Archive vital signs"></dl>
        <section id="materialLegend" aria-label="Memory material legend"></section>
      </aside>
    </main>
    <nav id="sedimentTimeline" class="sediment-timeline" aria-label="Memory history"></nav>
    <dialog id="archiveMenu" class="archive-menu" aria-labelledby="archiveMenuTitle"><form method="dialog"><h2 id="archiveMenuTitle">Archive controls</h2><label for="userId">Memory owner</label><input id="userId" name="userId" autocomplete="off"><fieldset id="categoryFilters"><legend>Memory forms</legend></fieldset><fieldset id="lifecycleFilters"><legend>Vitality</legend></fieldset><button id="motionToggle" type="button" aria-pressed="false">Reduce motion</button><button id="replayOpening" type="button">Replay awakening</button><button id="resetArchiveView" type="button">Reset view</button><button id="exportArchive" type="button">Export archive data</button><button id="retryArchive" type="button">Retry connection</button><button value="close">Close controls</button></form></dialog>
    <section id="observationSheet" class="observation-sheet" aria-labelledby="observationSheetTitle"><h2 id="observationSheetTitle">Memory observation</h2><div id="observationSheetContent"></div></section>
  </div>
  <script src="/vendor/d3/d3.min.js"></script>
  <script type="module" src="/scripts/main.js"></script>
</body>
</html>
