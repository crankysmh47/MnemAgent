services:
  mnemos-memory:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PROMPT_VERSION: v4-dual-path-write
    ports:
      - "8000:8000"
    volumes:
      - mnemos-data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/memory_state.db
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-}
      - MNEMAGENT_API_TOKEN=${MNEMAGENT_API_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

  mnemos-mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
      - MNEMAGENT_API_TOKEN=${MNEMAGENT_API_TOKEN:-}
      - MCP_PORT=8001
    depends_on:
      mnemos-memory:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Legacy SSE adapter (backward compatible)
  mnemos-mcp-adapter:
    build:
      context: ./openclaw-harness/mcp-adapter
      dockerfile: Dockerfile
    ports:
      - "8002:8001"
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - PORT=8001
    depends_on:
      mnemos-memory:
        condition: service_healthy
    profiles:
      - legacy
    restart: unless-stopped

  openclaw-harness:
    build:
      context: ./openclaw-harness
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./openclaw-harness/src/public:/app/src/public:ro
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
      - MNEMAGENT_API_TOKEN=${MNEMAGENT_API_TOKEN:-}
      - MCP_ADAPTER_URL=http://mnemos-mcp:8001
      - PORT=3000
    depends_on:
      mnemos-memory:
        condition: service_healthy
      mnemos-mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    profiles:
      - postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mnemagent}
      - POSTGRES_USER=${POSTGRES_USER:-mnemagent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - mnemos-postgres:/var/lib/postgresql/data
      - ./mcp-memory-server/src/storage/schema.postgres.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mnemagent} -d ${POSTGRES_DB:-mnemagent}"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mnemos-data:
  mnemos-postgres:
