services:
  mnemos-memory:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PROMPT_VERSION: v4-dual-path-write
    ports:
      - "8000:8000"
    volumes:
      - mnemos-data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/memory_state.db
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

  mnemos-mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
      - MCP_PORT=8001
    depends_on:
      mnemos-memory:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Legacy SSE adapter (backward compatible)
  mnemos-mcp-adapter:
    build:
      context: ./openclaw-harness/mcp-adapter
      dockerfile: Dockerfile
    ports:
      - "8002:8001"
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - PORT=8001
    depends_on:
      mnemos-memory:
        condition: service_healthy
    profiles:
      - legacy
    restart: unless-stopped

  openclaw-harness:
    build:
      context: ./openclaw-harness
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./openclaw-harness/src/public:/app/src/public:ro
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
      - MCP_ADAPTER_URL=http://mnemos-mcp:8001
      - PORT=3000
    depends_on:
      mnemos-memory:
        condition: service_healthy
      mnemos-mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  mnemos-data:
