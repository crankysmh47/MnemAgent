services:
  mnemos-memory:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PROMPT_VERSION: v4-dual-path-write
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-postgres}
      - DATABASE_URL=${DATABASE_URL:-postgresql://mnemagent:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-mnemagent}}
      - MNEMAGENT_API_TOKEN=${MNEMAGENT_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

  mnemos-mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
      - MNEMAGENT_API_TOKEN=${MNEMAGENT_API_TOKEN:-}
      - MCP_PORT=8001
    depends_on:
      mnemos-memory:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Legacy SSE adapter (backward compatible)
  mnemos-mcp-adapter:
    build:
      context: ./openclaw-harness/mcp-adapter
      dockerfile: Dockerfile
    ports:
      - "8002:8001"
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - PORT=8001
    depends_on:
      mnemos-memory:
        condition: service_healthy
    profiles:
      - legacy
    restart: unless-stopped

  openclaw-harness:
    build:
      context: ./openclaw-harness
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./openclaw-harness/src/public:/app/src/public:ro
      - ./config/openclaw:/app/config/openclaw:ro
      - judge-session-state:/app/data
    environment:
      - MNEMOS_URL=http://mnemos-memory:8000
      - MNEMOS_DEFAULT_USER_ID=${MNEMOS_DEFAULT_USER_ID:-}
      - MNEMAGENT_API_TOKEN=${MNEMAGENT_API_TOKEN:-}
      - MCP_ADAPTER_URL=http://mnemos-mcp:8001
      - PORT=3000
      - JUDGE_MODEL=${JUDGE_MODEL:-deepseek-api/deepseek-v4-flash}
      - JUDGE_MODEL_HARD_TOKEN_BUDGET=${JUDGE_MODEL_HARD_TOKEN_BUDGET:-2000000}
      - JUDGE_MAX_SPONSORED_SESSIONS=${JUDGE_MAX_SPONSORED_SESSIONS:-12}
      - JUDGE_ACCESS_CODE=${JUDGE_ACCESS_CODE:-mnemcode-local-judge}
      - JUDGE_SESSION_SECRET=${JUDGE_SESSION_SECRET:-local-development-session-secret-change-for-cloud-123456}
      - JUDGE_SESSION_STORE_PATH=/app/data/judge-sessions.json
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENCLAW_CONFIG_PATH=/app/config/openclaw/openclaw.json
      - MNEMAGENT_MCP_URL=${MNEMAGENT_MCP_URL:-http://mnemos-mcp:8001/mcp}
      - MNEMCODE_ROOT=/app
      - WORKSPACE_BROKER_URL=http://workspace-broker:8010
      - MNEMCODE_EVENT_URL=http://127.0.0.1:3000/api/judge/internal/events
      - WORKSPACE_HMAC_SECRET=${WORKSPACE_HMAC_SECRET:-local-development-hmac-secret-change-for-cloud-12345}
    depends_on:
      mnemos-memory:
        condition: service_healthy
      mnemos-mcp:
        condition: service_healthy
      workspace-broker:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  workspace-broker:
    build:
      context: .
      dockerfile: workspace-broker/Dockerfile
    ports:
      - "127.0.0.1:8010:8010"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - judge-workspaces:/workspaces
    group_add:
      - "${DOCKER_GID:-0}"
    environment:
      - JUDGE_DEMO_REPOSITORY=${JUDGE_DEMO_REPOSITORY:-crankysmh47/MnemBench}
      - JUDGE_GITHUB_TOKEN=${JUDGE_GITHUB_TOKEN:-}
      - WORKSPACE_HMAC_SECRET=${WORKSPACE_HMAC_SECRET:-local-development-hmac-secret-change-for-cloud-12345}
      - WORKSPACE_APPROVAL_SECRET=${WORKSPACE_APPROVAL_SECRET:-local-development-approval-secret-change-for-cloud-123}
      - WORKSPACE_ROOT=/workspaces
      - WORKSPACE_VOLUME=mnemagent-judge-workspaces
      - JUDGE_RUNNER_IMAGE=${JUDGE_RUNNER_IMAGE:-mnemagent-judge-runner:local}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8010/health',r=>process.exit(r.statusCode===200?0:1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  workspace-runner:
    build:
      context: ./workspace-runner
      dockerfile: Dockerfile
    image: ${JUDGE_RUNNER_IMAGE:-mnemagent-judge-runner:local}
    profiles: ["judge-build"]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mnemagent}
      - POSTGRES_USER=${POSTGRES_USER:-mnemagent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - mnemos-postgres:/var/lib/postgresql/data
      - ./mcp-memory-server/src/storage/schema.postgres.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mnemagent} -d ${POSTGRES_DB:-mnemagent}"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mnemos-postgres:
  judge-workspaces:
    name: mnemagent-judge-workspaces
  judge-session-state:
    name: mnemagent-judge-session-state
