services:
  mnemos-memory:
    ports: !reset []
    env_file: !override [.env.cloud]
    environment:
      MNEMAGENT_ENV: cloud
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}

  mnemos-mcp:
    ports: !reset []
    environment:
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}

  openclaw-harness:
    ports: !reset []
    env_file: !override [.env.cloud]
    environment:
      MNEMAGENT_ENV: cloud
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}

  postgres:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}

  caddy:
    image: caddy:2.8.4-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      MEMORY_DOMAIN: ${MEMORY_DOMAIN:?set MEMORY_DOMAIN}
      AGENT_DOMAIN: ${AGENT_DOMAIN:?set AGENT_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
      OPENCLAW_BASIC_AUTH_HASH: ${OPENCLAW_BASIC_AUTH_HASH:?set OPENCLAW_BASIC_AUTH_HASH}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      openclaw-harness:
        condition: service_healthy
    restart: unless-stopped

  openclaw:
    image: ${OPENCLAW_IMAGE:?set a tested OpenClaw image}
    profiles: [judge-agent]
    expose: ["18789"]
    env_file: [.env.cloud]
    volumes:
      - ./config/openclaw:/root/.openclaw:ro
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
