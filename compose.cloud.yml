services:
  mnemos-memory:
    ports: !override ["127.0.0.1:8000:8000"]
    env_file: !override [.env.cloud]
    environment:
      MNEMAGENT_ENV: cloud
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}

  mnemos-mcp:
    ports: !override ["127.0.0.1:8001:8001"]
    environment:
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}

  openclaw-harness:
    ports: !reset []
    env_file: !override [.env.cloud]
    environment:
      MNEMAGENT_ENV: cloud
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}
      JUDGE_ACCESS_CODE: ${JUDGE_ACCESS_CODE:?set JUDGE_ACCESS_CODE}
      JUDGE_SESSION_SECRET: ${JUDGE_SESSION_SECRET:?set JUDGE_SESSION_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      JUDGE_MODEL_HARD_TOKEN_BUDGET: ${JUDGE_MODEL_HARD_TOKEN_BUDGET:-2000000}
      JUDGE_MAX_SPONSORED_SESSIONS: ${JUDGE_MAX_SPONSORED_SESSIONS:-12}
      MNEMAGENT_MCP_URL: http://mnemos-mcp:8001/mcp
      WORKSPACE_HMAC_SECRET: ${WORKSPACE_HMAC_SECRET:?set WORKSPACE_HMAC_SECRET}

  workspace-broker:
    ports: !override ["127.0.0.1:8010:8010"]
    env_file: !override [.env.cloud]
    environment:
      JUDGE_DEMO_REPOSITORY: ${JUDGE_DEMO_REPOSITORY:?set JUDGE_DEMO_REPOSITORY}
      JUDGE_GITHUB_TOKEN: ${JUDGE_GITHUB_TOKEN:?set JUDGE_GITHUB_TOKEN}
      WORKSPACE_HMAC_SECRET: ${WORKSPACE_HMAC_SECRET:?set WORKSPACE_HMAC_SECRET}
      WORKSPACE_APPROVAL_SECRET: ${WORKSPACE_APPROVAL_SECRET:?set WORKSPACE_APPROVAL_SECRET}
      JUDGE_RUNNER_IMAGE: ${JUDGE_RUNNER_IMAGE:?set a pinned runner image tag}

  postgres:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}

  caddy:
    image: caddy:2.8.4-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      MEMORY_DOMAIN: ${MEMORY_DOMAIN:?set MEMORY_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      openclaw-harness:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
