services:
  mnemos-memory:
    ports: !override ["127.0.0.1:8000:8000"]
    env_file: !override [.env.cloud]
    environment:
      MNEMAGENT_ENV: cloud
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}

  mnemos-mcp:
    ports: !override ["127.0.0.1:8001:8001"]
    environment:
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}

  openclaw-harness:
    ports: !reset []
    env_file: !override [.env.cloud]
    environment:
      MNEMAGENT_ENV: cloud
      MNEMAGENT_API_TOKEN: ${MNEMAGENT_API_TOKEN:?set MNEMAGENT_API_TOKEN}

  postgres:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}

  caddy:
    image: caddy:2.8.4-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      MEMORY_DOMAIN: ${MEMORY_DOMAIN:?set MEMORY_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      openclaw-harness:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
